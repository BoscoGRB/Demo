<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;

  }
  canvas {
    border-radius: 12px;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 60px rgba(255,110,180,0.2), 0 0 120px rgba(0,207,255,0.1);
    display: block;
    max-width: 100vw;
    max-height: 96vh;
  }
  #label {
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    margin-top: 8px;
  }
</style>
</head>
<body>
<canvas id="game" width="800" height="540"></canvas>
<p id="label">ISSY: DATA WORLD — ISS Experience Center</p>

<script>

const JUMP_FORCE = -11;
const MOVE_SPEED = 4;
const COIN_SIZE = 22;
const PLAYER_W = 36;
const PLAYER_H = 48;

      { x:0,    y:510, w:360, h:PLATFORM_H, color:"#00cfff" },

      { coinsNeeded:14, text:"Briljant! 🏆 De werkplek is volledig geoptimaliseerd. Issy heeft van dit kantoor een echte happy place gemaakt!" },
    ],
    goal: { x:1690, y:135 }, width: 2000,
  },
];

const gs = {
  player: { x:80, y:420, vx:0, vy:0, onGround:false, facing:1 },
  camera: { x:0 },
  coins: [],
  collectedCoins: 0,
  levelIdx: 0,
  keys: {},
  issyMessage: null,
  issyMessageAlpha: 0,
  issyTimeout: null,
  shownMessages: new Set(),
  particles: [],
  gamePhase: "title",
  starField: Array.from({length:40}, () => ({
    x: Math.random()*2200, y: Math.random()*540,
    size: Math.random()*2+1, speed: Math.random()*0.3+0.1,
  })),
};

function resetLevel(idx) {
  const lv = LEVELS[idx];
  gs.player = { x:80, y:420, vx:0, vy:0, onGround:false, facing:1 };
  gs.camera = { x:0 };
  gs.coins = lv.coins.map((c,i) => ({ ...c, id:i, collected:false, floatOffset:Math.random()*Math.PI*2 }));
  gs.collectedCoins = 0;
  gs.levelIdx = idx;
  gs.issyMessage = null;
  gs.issyMessageAlpha = 0;
  gs.shownMessages = new Set();
  gs.particles = [];
  gs.gamePhase = "playing";
}

function spawnParticles(x, y, color) {
  const emojis = ["✨","⭐","💫","🌟"];
  for (let i=0; i<10; i++) {
    gs.particles.push({
      x, y,
      vx: (Math.random()-0.5)*7,
      vy: (Math.random()-2.5)*4,
      life: 1, color,
      size: Math.random()*7+3,
      emoji: Math.random()>0.6 ? emojis[Math.floor(Math.random()*emojis.length)] : null,
    });
  }
}

function roundRect(ctx, x, y, w, h, r, fill, stroke, sw) {
  sw = sw || 2;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fill)   { ctx.fillStyle = fill;     ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw; ctx.stroke(); }
}

function drawBackground(ctx, lv, camX, time) {
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, lv.bg[0]);
  bg.addColorStop(1, lv.bg[1]);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);
  gs.starField.forEach(s => {
    const sx = ((s.x - camX*s.speed*0.5) % W + W) % W;
    ctx.globalAlpha = 0.4 + Math.sin(time*0.02+s.x)*0.2;
    ctx.fillStyle = lv.accent2;
    ctx.beginPath();
    ctx.arc(sx, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  for (let sy=0; sy<H; sy+=6) {
    ctx.fillStyle = "rgba(0,0,0,0.06)";
    ctx.fillRect(0,sy,W,2);
  }
}

function drawPlatform(ctx, plat, camX, time) {
  const px = plat.x - camX;
  if (px+plat.w < -10 || px > canvas.width+10) return;
  const shimmer = Math.sin(time*0.03+plat.x*0.01)*0.15+0.85;
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.roundRect(px+4, plat.y+6, plat.w, PLATFORM_H, 6);
  ctx.fill();
  const g = ctx.createLinearGradient(px, plat.y, px, plat.y+PLATFORM_H);
  g.addColorStop(0, plat.color+"ff");
  g.addColorStop(1, plat.color+"66");
  roundRect(ctx, px, plat.y, plat.w, PLATFORM_H, 6, g, null);
  ctx.globalAlpha = shimmer*0.7;
  roundRect(ctx, px+6, plat.y+2, plat.w-12, 4, 2, "rgba(255,255,255,0.5)", null);
  ctx.globalAlpha = 1;
  for (let dx=px+14; dx<px+plat.w-10; dx+=20) {
    ctx.beginPath();
    ctx.arc(dx, plat.y+PLATFORM_H/2, 2, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fill();
  }
}

function drawCoin(ctx, coin, lv, camX, time) {
  if (coin.collected) return;
  const cx = coin.x - camX + COIN_SIZE/2;
  const cy = coin.y + Math.sin(time*0.04+coin.floatOffset)*5;
  const scaleX = Math.abs(Math.cos(time*0.025+coin.floatOffset))*0.5+0.5;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scaleX, 1);
  const grd = ctx.createRadialGradient(0,0,2,0,0,COIN_SIZE+4);
  grd.addColorStop(0, lv.coinColor+"cc");
  grd.addColorStop(1, lv.coinColor+"00");
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0,0,COIN_SIZE+4,0,Math.PI*2);
  ctx.fill();
  const cg = ctx.createRadialGradient(-3,-3,2,0,0,COIN_SIZE/2);
  cg.addColorStop(0, lv.accent2);
  cg.addColorStop(1, lv.coinColor);
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(0,0,COIN_SIZE/2,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = lv.bg[0];
  ctx.font = "bold " + Math.round(COIN_SIZE*0.52) + "px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("D", 0, 1);
  ctx.restore();
}

function drawGoal(ctx, goal, lv, camX, time) {
  const gx = goal.x - camX + 25;
  const gy = goal.y;
  const pulse = Math.sin(time*0.05)*0.3+0.7;
  ctx.save();
  ctx.translate(gx, gy+30);
  for (let i=3; i>=0; i--) {
    ctx.beginPath();
    ctx.arc(0,0,28+i*10,0,Math.PI*2);
    ctx.strokeStyle = lv.accent;
    ctx.globalAlpha = pulse*(1-i*0.22);
    ctx.lineWidth = 3-i*0.5;
    ctx.stroke();
  }
  ctx.globalAlpha = pulse*0.9;
  ctx.fillStyle = lv.accent;
  ctx.font = "28px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(lv.emoji, 0, 0);
  ctx.globalAlpha = 1;
  ctx.fillStyle = lv.accent;
  ctx.font = "bold 11px sans-serif";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("FINISH", 0, 46);
  ctx.restore();
}

function drawPlayer(ctx, p, lv, time) {
  const px = p.x - gs.camera.x;
  const py = p.y;
  const bob = p.onGround ? Math.sin(time*0.12)*1.5 : 0;
  ctx.save();
  ctx.translate(px+PLAYER_W/2, py+PLAYER_H/2+bob);
  ctx.scale(p.facing, 1);
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(0, PLAYER_H/2+4, 14, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#2244aa";
  ctx.fillRect(-10, PLAYER_H/2-16, 8, 16);
  ctx.fillRect(2,   PLAYER_H/2-16, 8, 16);
  const bodyGrad = ctx.createLinearGradient(-PLAYER_W/2+4,-10,PLAYER_W/2-4,10);
  bodyGrad.addColorStop(0, lv.accent);
  bodyGrad.addColorStop(1, lv.accent+"88");
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(-PLAYER_W/2+4, -PLAYER_H/2+14, PLAYER_W-8, PLAYER_H-26, 5);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = "bold 7px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("ISS", 0, -PLAYER_H/2+26);
  const headGrad = ctx.createRadialGradient(-2,-PLAYER_H/2+5,2,0,-PLAYER_H/2+8,12);
  headGrad.addColorStop(0, "#fde5c0");
  headGrad.addColorStop(1, "#f0b87a");
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(0, -PLAYER_H/2+8, 11, 12, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#222";
  ctx.beginPath();
  ctx.arc(4, -PLAYER_H/2+6, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(4.8, -PLAYER_H/2+5.2, 1, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = "#a0522d";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(2, -PLAYER_H/2+11, 4, 0.1, Math.PI-0.1);
  ctx.stroke();
  ctx.fillStyle = lv.accent;
  ctx.fillRect(-9, -PLAYER_H/2-4, 18, 5);
  ctx.fillRect(-6, -PLAYER_H/2-10, 12, 7);
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillRect(-6, -PLAYER_H/2-10, 12, 2);
  ctx.restore();
}

function drawHUD(ctx, lv, collectedCoins) {
  const W = canvas.width;
  const total = lv.coins.length;
  roundRect(ctx, 10, 10, 240, 68, 10, "rgba(0,0,0,0.55)", lv.accent, 1.5);
  ctx.fillStyle = lv.accent;
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillText(lv.emoji + " " + lv.name, 20, 32);
  ctx.fillStyle = "#fff";
  ctx.font = "12px sans-serif";
  ctx.fillText("Data: " + collectedCoins + " / " + total, 20, 52);
  roundRect(ctx, 20, 60, 200, 8, 4, "rgba(255,255,255,0.15)", null);
  if (collectedCoins > 0) roundRect(ctx, 20, 60, 200*(collectedCoins/total), 8, 4, lv.accent, null);
  roundRect(ctx, W-100, 10, 90, 36, 8, "rgba(0,0,0,0.55)", lv.accent, 1.5);
  ctx.fillStyle = lv.accent;
  ctx.font = "bold 12px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("LEVEL " + (gs.levelIdx+1) + " / " + LEVELS.length, W-55, 32);
}

function drawIssyBubble(ctx) {
  if (!gs.issyMessage) return;
  gs.issyMessageAlpha = Math.min(1, gs.issyMessageAlpha+0.06);
  const lv = LEVELS[gs.levelIdx];
  const W = canvas.width, H = canvas.height;
  const boxW=520, boxH=90;
  const bx=W/2-boxW/2, by=H-115;
  ctx.globalAlpha = gs.issyMessageAlpha;
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath();
  ctx.roundRect(bx+4, by+4, boxW, boxH, 12);
  ctx.fill();
  roundRect(ctx, bx, by, boxW, boxH, 12, "#ffffffe8", lv.accent, 2.5);
  ctx.fillStyle = lv.accent;
  ctx.beginPath();
  ctx.arc(bx+32, by+32, 20, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.font = "bold 11px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("ISSY", bx+32, by+32);
  ctx.fillStyle = "#111";
  ctx.font = "13px sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  const words = gs.issyMessage.split(" ");
  let line="", lineY=by+26, maxW=boxW-70;
  words.forEach(function(w) {
    const test = line+w+" ";
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, bx+60, lineY);
      line=w+" "; lineY+=20;
    } else line=test;
  });
  ctx.fillText(line, bx+60, lineY);
  ctx.globalAlpha = 1;
}

function drawTitle(ctx, time) {
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#1a0533");
  bg.addColorStop(0.5,"#001a33");
  bg.addColorStop(1,"#1a1a00");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);
  for (let i=0; i<8; i++) {
    const bx2 = (i*113 + time*0.3) % W;
    const by2 = H - ((time*(0.4+i*0.1)+i*80) % 620);
    ctx.beginPath();
    ctx.arc(bx2, by2, 6+i*3, 0, Math.PI*2);
    ctx.fillStyle = ["#ff6eb444","#ffd70044","#00cfff44"][i%3];
    ctx.fill();
  }
  const pulse = Math.sin(time*0.04)*0.08+0.92;
  ctx.globalAlpha = pulse;
  ctx.textAlign = "center";
  ctx.font = "bold 52px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText("🌟 ISSY: DATA WORLD 🌟", W/2, 148);
  ctx.globalAlpha = 1;
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.font = "17px sans-serif";
  ctx.fillText("Verzamel datapunten en maak de werkwereld slimmer!", W/2, 192);
  LEVELS.forEach(function(lv, i) {
    const lx = W/2 + (i-1)*190;
    roundRect(ctx, lx-75, 228, 150, 80, 12, lv.bg[0]+"cc", lv.accent, 2);
    ctx.fillStyle = lv.accent;
    ctx.font = "26px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(lv.emoji, lx, 268);
    ctx.font = "bold 11px sans-serif";
    ctx.textBaseline = "alphabetic";
    ctx.fillText(lv.name, lx, 296);
  });
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.font = "14px sans-serif";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("← → bewegen  |  ↑ of SPATIE om te springen", W/2, 358);
  const blink = Math.sin(time*0.08)>0 ? 1 : 0.25;
  ctx.globalAlpha = blink;
  ctx.fillStyle = "#fff";
  ctx.font = "bold 20px sans-serif";
  ctx.fillText("▶  DRUK ENTER OM TE STARTEN", W/2, 418);
  ctx.globalAlpha = 1;
}

function drawLevelComplete(ctx, time) {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0,0,W,H);
  const lv = LEVELS[gs.levelIdx];
  const isLast = gs.levelIdx === LEVELS.length-1;
  ctx.textAlign = "center";
  ctx.font = "bold 46px sans-serif";
  ctx.fillStyle = lv.accent;
  ctx.textBaseline = "alphabetic";
  ctx.fillText(isLast ? "🏆 GAME COMPLEET! 🏆" : lv.emoji+" LEVEL COMPLEET!", W/2, H/2-50);
  ctx.fillStyle = "#fff";
  ctx.font = "20px sans-serif";
  ctx.fillText(gs.collectedCoins+" van "+lv.coins.length+" datapunten verzameld", W/2, H/2+5);
  if (isLast) {
    ctx.fillStyle = lv.accent2;
    ctx.font = "15px sans-serif";
    ctx.fillText("Issy heeft alle werkplekken geoptimaliseerd. Goed gedaan! 🌟", W/2, H/2+40);
  }
  const blink = Math.sin(time*0.08)>0 ? 1 : 0.25;
  ctx.globalAlpha = blink;
  ctx.fillStyle = "#fff";
  ctx.font = "bold 18px sans-serif";
  ctx.fillText(isLast ? "ENTER → Opnieuw spelen" : "ENTER → Volgend level", W/2, H/2+80);
  ctx.globalAlpha = 1;
}

// Input
window.addEventListener("keydown", function(e) {
  gs.keys[e.key] = true;
  if ([" ","ArrowUp","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
  if (e.key === "Enter") {
    if (gs.gamePhase === "title") resetLevel(0);
    else if (gs.gamePhase === "levelComplete") {
      const next = gs.levelIdx+1;
      if (next < LEVELS.length) resetLevel(next);
      else gs.gamePhase = "win";
    } else if (gs.gamePhase === "win") resetLevel(0);
  }
});
window.addEventListener("keyup", function(e) { gs.keys[e.key] = false; });

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let time = 0;

function loop() {
  time++;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (gs.gamePhase === "title") {
    drawTitle(ctx, time);
    requestAnimationFrame(loop);
    return;
  }
  if (gs.gamePhase === "levelComplete" || gs.gamePhase === "win") {
    const lv = LEVELS[gs.levelIdx];
    drawBackground(ctx, lv, gs.camera.x, time);
    lv.platforms.forEach(function(p){ drawPlatform(ctx, p, gs.camera.x, time); });
    drawLevelComplete(ctx, time);
    requestAnimationFrame(loop);
    return;
  }

  const lv = LEVELS[gs.levelIdx];
  const p = gs.player;

  if      (gs.keys["ArrowLeft"]  || gs.keys["a"]) { p.vx = -MOVE_SPEED; p.facing = -1; }
  else if (gs.keys["ArrowRight"] || gs.keys["d"]) { p.vx =  MOVE_SPEED; p.facing =  1; }
  else p.vx *= 0.75;

  if ((gs.keys["ArrowUp"] || gs.keys[" "] || gs.keys["w"]) && p.onGround) {
    p.vy = JUMP_FORCE; p.onGround = false;
  }

  p.vy += GRAVITY;
  p.x  += p.vx;
  p.y  += p.vy;
  p.onGround = false;

  lv.platforms.forEach(function(plat) {
    if (p.x+PLAYER_W > plat.x && p.x < plat.x+plat.w &&
        p.y+PLAYER_H > plat.y && p.y+PLAYER_H < plat.y+PLATFORM_H+14 && p.vy >= 0) {
      p.y = plat.y - PLAYER_H;
      p.vy = 0;
      p.onGround = true;
    }
  });

  if (p.x < 0) p.x = 0;
  if (p.x+PLAYER_W > lv.width) p.x = lv.width-PLAYER_W;
  if (p.y > canvas.height+80) { p.y=420; p.x=80; p.vy=0; }

  const targetX = p.x - canvas.width/2 + PLAYER_W/2;
  gs.camera.x += (Math.max(0, Math.min(lv.width-canvas.width, targetX)) - gs.camera.x)*0.1;

  gs.coins.forEach(function(coin) {
    if (coin.collected) return;
    if (p.x < coin.x+COIN_SIZE && p.x+PLAYER_W > coin.x &&
        p.y < coin.y+COIN_SIZE && p.y+PLAYER_H > coin.y) {
      coin.collected = true;
      gs.collectedCoins++;
      spawnParticles(coin.x - gs.camera.x + COIN_SIZE/2, coin.y, lv.coinColor);
      lv.issyMessages.forEach(function(msg) {
        if (!gs.shownMessages.has(msg.coinsNeeded) && gs.collectedCoins >= msg.coinsNeeded) {
          gs.shownMessages.add(msg.coinsNeeded);
          gs.issyMessage = msg.text;
          gs.issyMessageAlpha = 0;
          if (gs.issyTimeout) clearTimeout(gs.issyTimeout);
          gs.issyTimeout = setTimeout(function() {
            gs.issyMessage = null;
            gs.issyMessageAlpha = 0;
          }, 5500);
        }
      });
    }
  });

  const goal = lv.goal;
  if (p.x+PLAYER_W > goal.x && p.x < goal.x+60 &&
      p.y+PLAYER_H > goal.y && p.y < goal.y+80) {
    gs.gamePhase = "levelComplete";
  }

  gs.particles = gs.particles.filter(function(pt){ return pt.life > 0; });
  gs.particles.forEach(function(pt) {
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += 0.18; pt.life -= 0.025; pt.size *= 0.96;
  });

  drawBackground(ctx, lv, gs.camera.x, time);
  lv.platforms.forEach(function(pl){ drawPlatform(ctx, pl, gs.camera.x, time); });
  drawGoal(ctx, goal, lv, gs.camera.x, time);
  gs.coins.forEach(function(c){ drawCoin(ctx, c, lv, gs.camera.x, time); });

  gs.particles.forEach(function(pt) {
    ctx.globalAlpha = pt.life;
    if (pt.emoji) {
      ctx.font = (pt.size*2) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(pt.emoji, pt.x, pt.y);
    } else {
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  drawPlayer(ctx, p, lv, time);
  drawHUD(ctx, lv, gs.collectedCoins);
  drawIssyBubble(ctx);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
